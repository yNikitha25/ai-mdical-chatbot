services:
  - type: web
    name: medivision-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        fromService:
          type: web
          name: medivision-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: MONGODB_URI
        sync: false # User needs to provide this
      - key: OPENAI_API_KEY
        sync: false # User needs to provide this
      - key: GEMINI_API_KEY
        sync: false # User needs to provide this
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: medivision-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: medivision-backend
          envVarKey: RENDER_EXTERNAL_URL

services:
  - type: web
    name: medivision-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        sync: false # User needs to provide this
      - key: MONGODB_URI
        sync: false # User needs to provide this
      - key: OPENAI_API_KEY
        sync: false # User needs to provide this
      - key: GEMINI_API_KEY
        sync: false # User needs to provide this
      - key: JWT_SECRET
        generateValue: true
